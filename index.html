<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <!-- Evita que o navegador guarde uma versao antiga desta pagina -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="theme-color" content="#0b1220" />
    <meta name="description" content="Controle de exames oncologicos - APACs, laudos e documentos" />
    <title>Controle de Exames - Oncologia</title>
    <style>
      #boot {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        min-height: 100vh; gap: 14px; font-family: system-ui, sans-serif; color: #94a3b8;
        padding: 24px; text-align: center;
      }
      #boot .spin {
        width: 42px; height: 42px; border-radius: 50%;
        border: 4px solid #334155; border-top-color: #337bff;
        animation: girar 0.8s linear infinite;
      }
      @keyframes girar { to { transform: rotate(360deg); } }
      #boot pre {
        max-width: 90vw; overflow: auto; text-align: left; font-size: 12px;
        background: #1e293b; color: #fca5a5; padding: 12px; border-radius: 10px;
      }
      #boot button {
        font-size: 16px; font-weight: 700; color: #fff; background: #1c5ef5;
        border: 0; border-radius: 12px; padding: 12px 22px; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot">
        <div class="spin"></div>
        <p>Carregando o sistema&hellip;</p>
      </div>
    </div>
    <script>
      // Rede de seguranca: se o app nao carregar, mostra o motivo em vez de tela branca.
      (function () {
        function mostrarErro(titulo, detalhe) {
          var boot = document.getElementById('boot');
          if (!boot) return; // app ja montou; deixa o React cuidar
          boot.innerHTML =
            '<p style="font-size:18px;color:#f87171;font-weight:700">&#9888;&#65039; ' + titulo + '</p>' +
            (detalhe ? '<pre>' + String(detalhe).replace(/</g, '&lt;') + '</pre>' : '') +
            '<button onclick="location.reload(true)">Recarregar p&aacute;gina</button>' +
            '<p style="font-size:13px">Se continuar, limpe o cache: Ctrl+Shift+R (computador) ou limpe os dados do site (celular).</p>';
        }
        window.addEventListener(
          'error',
          function (e) {
            if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
              mostrarErro(
                'Falha ao baixar um arquivo do sistema (versão antiga em cache)',
                (e.target.src || e.target.href || '')
              );
            } else if (e.error) {
              mostrarErro('Erro ao iniciar o sistema', e.error.stack || e.message);
            }
          },
          true
        );
        window.addEventListener('unhandledrejection', function (e) {
          mostrarErro('Erro ao iniciar o sistema', (e.reason && e.reason.stack) || e.reason);
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
